name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse zip

      - name: Test
        run: mise run test

      - name: Package Linux AppImage
        run: mise run package:linux

      - name: Package Windows zip
        run: mise run package:windows

      - uses: actions/upload-artifact@v4
        with:
          name: PeerlessPatcher-linux-x64
          path: dist/PeerlessPatcher-linux-x64.AppImage
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: PeerlessPatcher-windows-x64
          path: dist/PeerlessPatcher-windows-x64.zip
          if-no-files-found: error

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.${{ github.run_number }}
          name: v0.${{ github.run_number }}
          files: |
            artifacts/PeerlessPatcher-windows-x64/PeerlessPatcher-windows-x64.zip
            artifacts/PeerlessPatcher-linux-x64/PeerlessPatcher-linux-x64.AppImage
