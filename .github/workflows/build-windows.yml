name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run tests
        run: dotnet test src/PeerlessPatcher.Tests/PeerlessPatcher.Tests.csproj --configuration Release

      - name: Publish self-contained Windows x64
        run: >
          dotnet publish src/PeerlessPatcher/PeerlessPatcher.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o dist/win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PeerlessPatcher-windows-x64
          path: dist/win-x64/
          if-no-files-found: error

      - name: Create release asset (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path dist/win-x64/* -DestinationPath PeerlessPatcher-windows-x64.zip
        shell: pwsh

      - name: Upload to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PeerlessPatcher-windows-x64.zip
