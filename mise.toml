[tools]
dotnet = "8.0.420"
java = "21"

[env]
# Ghidra version to download if not already installed.
# Matches the GitHub release tag: Ghidra_<GHIDRA_VERSION>_build
GHIDRA_VERSION = "11.3.2"

[tasks."setup:ghidra"]
description = "Set up Ghidra for headless analysis — detects existing install or downloads from GitHub"
run = '''
#!/usr/bin/env bash
set -euo pipefail

TOOLS_DIR="${MISE_PROJECT_ROOT}/tools"
LOCAL_HEADLESS="${TOOLS_DIR}/ghidra/support/analyzeHeadless"

# 1. Already set up in tools/ghidra/
if [ -x "${LOCAL_HEADLESS}" ]; then
  echo "Ghidra already installed at: ${TOOLS_DIR}/ghidra"
  echo "analyzeHeadless: ${LOCAL_HEADLESS}"
  exit 0
fi

# 2. Available on system PATH
if command -v analyzeHeadless &>/dev/null; then
  echo "Ghidra found on system PATH: $(command -v analyzeHeadless)"
  exit 0
fi

# 3. Download from GitHub releases
echo "Ghidra not found — downloading version ${GHIDRA_VERSION} ..."
TAG="Ghidra_${GHIDRA_VERSION}_build"
API_URL="https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/tags/${TAG}"

DOWNLOAD_URL=$(python3 -c "
import urllib.request, json, sys
with urllib.request.urlopen('${API_URL}') as r:
    data = json.load(r)
for asset in data.get('assets', []):
    name = asset['name']
    if name.endswith('.zip') and 'PUBLIC' in name:
        print(asset['browser_download_url'])
        sys.exit(0)
sys.exit(1)
")

if [ -z "${DOWNLOAD_URL}" ]; then
  echo "ERROR: Could not find a PUBLIC zip asset in GitHub release ${TAG}" >&2
  exit 1
fi

ZIP_NAME=$(basename "${DOWNLOAD_URL}")
mkdir -p "${TOOLS_DIR}"
echo "Downloading: ${DOWNLOAD_URL}"
curl -L --progress-bar -o "${TOOLS_DIR}/${ZIP_NAME}" "${DOWNLOAD_URL}"

echo "Extracting..."
unzip -q "${TOOLS_DIR}/${ZIP_NAME}" -d "${TOOLS_DIR}/_ghidra_tmp"
rm "${TOOLS_DIR}/${ZIP_NAME}"

# The zip contains a top-level folder like ghidra_11.3.2_PUBLIC
EXTRACTED=$(find "${TOOLS_DIR}/_ghidra_tmp" -mindepth 1 -maxdepth 1 -type d | head -1)
mv "${EXTRACTED}" "${TOOLS_DIR}/ghidra"
rmdir "${TOOLS_DIR}/_ghidra_tmp"

chmod +x "${LOCAL_HEADLESS}"

echo ""
echo "Ghidra ${GHIDRA_VERSION} installed at: ${TOOLS_DIR}/ghidra"
echo "analyzeHeadless: ${LOCAL_HEADLESS}"
echo ""
echo "TIP: Create a projects directory for analysis output:"
echo "  mkdir -p ${MISE_PROJECT_ROOT}/tools/ghidra-projects"
'''

[tasks."build:linux"]
description = "Build self-contained Linux x64 binary"
run = "dotnet publish src/PeerlessPatcher/PeerlessPatcher.csproj -c Release -r linux-x64 --self-contained true -o dist/linux-x64"

[tasks."build:windows"]
description = "Build self-contained Windows x64 directory (cross-compiles from Linux)"
run = "dotnet publish src/PeerlessPatcher/PeerlessPatcher.csproj -c Release -r win-x64 --self-contained true -o dist/win-x64"

[tasks."build:debug"]
description = "Build debug app for the current host platform"
run = "dotnet build src/PeerlessPatcher/PeerlessPatcher.csproj -c Debug"
sources = ["src/**/*.cs", "src/**/*.csproj", "profiles/**/*.json"]
outputs = ["src/PeerlessPatcher/bin/Debug/net8.0/PeerlessPatcher.dll"]

[tasks."build:debug:linux"]
description = "Build debug linux-x64 binary"
run = "dotnet build src/PeerlessPatcher/PeerlessPatcher.csproj -c Debug -r linux-x64 --no-self-contained"
sources = ["src/**/*.cs", "src/**/*.csproj", "profiles/**/*.json"]
outputs = ["src/PeerlessPatcher/bin/Debug/net8.0/linux-x64/PeerlessPatcher"]

[tasks."run"]
description = "Build (if needed) and run the app on the current host platform"
run = "dotnet run --project src/PeerlessPatcher/PeerlessPatcher.csproj -c Debug --no-build"
depends = ["build:debug"]

[tasks."run_windows"]
description = "Build (if needed) and run on Windows"
run = "dotnet run --project src/PeerlessPatcher/PeerlessPatcher.csproj -c Debug --no-build"
depends = ["build:debug"]

[tasks."run:linux"]
description = "Build (if needed) and run natively on Linux; supports Flatpak host-launch"
run = """
EXE=$(pwd)/src/PeerlessPatcher/bin/Debug/net8.0/linux-x64/PeerlessPatcher
if [ -n "$FLATPAK_ID" ]; then
  # Running inside a Flatpak sandbox (e.g. VS Code) — spawn on the host where
  # display/GPU access works. Requires flatpak-spawn and dotnet on the host PATH.
  echo "Detected Flatpak ($FLATPAK_ID), launching on host..."
  flatpak-spawn --host bash -c "DOTNET_ROOT=$DOTNET_ROOT PATH=$PATH $EXE"
else
  "$EXE"
fi
"""
depends = ["build:debug:linux"]

[tasks."test"]
description = "Run unit tests"
run = "dotnet test src/PeerlessPatcher.Tests/PeerlessPatcher.Tests.csproj"

[tasks."test:integration"]
description = "Run unit tests + UI integration tests (requires a display; Linux only)"
run = "SGPATCHER_INTEGRATION_TESTS=1 dotnet test src/PeerlessPatcher.Tests/PeerlessPatcher.Tests.csproj"

[tasks."package:windows"]
description = "Zip Windows build into dist/PeerlessPatcher-windows-x64.zip"
depends = ["build:windows"]
run = "(cd dist/win-x64 && zip -r ../PeerlessPatcher-windows-x64.zip .)"

[tasks."package:linux"]
description = "Build Linux AppImage into dist/PeerlessPatcher-linux-x64.AppImage"
depends = ["build:linux"]
run = '''
#!/usr/bin/env bash
set -euo pipefail

rm -rf AppDir
mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps

cp -r dist/linux-x64/* AppDir/usr/bin/

cat > AppDir/PeerlessPatcher.desktop <<'DESKTOP'
[Desktop Entry]
Name=Peerless Patcher
Exec=PeerlessPatcher
Icon=PeerlessPatcher
Type=Application
Categories=Utility;
DESKTOP
cp AppDir/PeerlessPatcher.desktop AppDir/usr/share/applications/PeerlessPatcher.desktop

cp profiles/assets/icon.png AppDir/PeerlessPatcher.png
cp profiles/assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/PeerlessPatcher.png

cat > AppDir/AppRun <<'APPRUN'
#!/bin/bash
HERE="$(dirname "$(readlink -f "$0")")"
export LD_LIBRARY_PATH="$HERE/usr/bin:$LD_LIBRARY_PATH"
exec "$HERE/usr/bin/PeerlessPatcher" "$@"
APPRUN
chmod +x AppDir/AppRun

if [ ! -f appimagetool-x86_64.AppImage ]; then
  wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
  chmod +x appimagetool-x86_64.AppImage
fi

mkdir -p dist
ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir dist/PeerlessPatcher-linux-x64.AppImage
'''
