[tools]
dotnet = "8.0.420"

[tasks."build:linux"]
description = "Build self-contained Linux x64 binary"
run = "dotnet publish src/PeerlessPatcher/PeerlessPatcher.csproj -c Release -r linux-x64 --self-contained true -o dist/linux-x64"

[tasks."build:windows"]
description = "Build self-contained Windows x64 directory (cross-compiles from Linux)"
run = "dotnet publish src/PeerlessPatcher/PeerlessPatcher.csproj -c Release -r win-x64 --self-contained true -o dist/win-x64"

[tasks."build:debug"]
description = "Build debug linux-x64 binary (used by the run task)"
run = "dotnet build src/PeerlessPatcher/PeerlessPatcher.csproj -c Debug -r linux-x64 --no-self-contained"
sources = ["src/**/*.cs", "src/**/*.csproj", "profiles/**/*.json"]
outputs = ["src/PeerlessPatcher/bin/Debug/net8.0/linux-x64/PeerlessPatcher"]

[tasks."run"]
description = "Build (if needed) and run SteamGamePatcher natively on Linux"
run = """
EXE=$(pwd)/src/PeerlessPatcher/bin/Debug/net8.0/linux-x64/PeerlessPatcher
if [ -n "$FLATPAK_ID" ]; then
  # Running inside a Flatpak sandbox (e.g. VS Code) — spawn on the host where
  # display/GPU access works. Requires flatpak-spawn and dotnet on the host PATH.
  echo "Detected Flatpak ($FLATPAK_ID), launching on host..."
  flatpak-spawn --host bash -c "DOTNET_ROOT=$DOTNET_ROOT PATH=$PATH $EXE"
else
  "$EXE"
fi
"""
depends = ["build:debug"]

[tasks."test"]
description = "Run unit tests"
run = "dotnet test src/PeerlessPatcher.Tests/PeerlessPatcher.Tests.csproj"

[tasks."test:integration"]
description = "Run unit tests + UI integration tests (requires a display; Linux only)"
run = "SGPATCHER_INTEGRATION_TESTS=1 dotnet test src/PeerlessPatcher.Tests/PeerlessPatcher.Tests.csproj"

[tasks."package:windows"]
description = "Zip Windows build into dist/PeerlessPatcher-windows-x64.zip"
depends = ["build:windows"]
run = "(cd dist/win-x64 && zip -r ../PeerlessPatcher-windows-x64.zip .)"

[tasks."package:linux"]
description = "Build Linux AppImage into dist/PeerlessPatcher-linux-x64.AppImage"
depends = ["build:linux"]
run = '''
#!/usr/bin/env bash
set -euo pipefail

rm -rf AppDir
mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps

cp -r dist/linux-x64/* AppDir/usr/bin/

cat > AppDir/PeerlessPatcher.desktop <<'DESKTOP'
[Desktop Entry]
Name=Peerless Patcher
Exec=PeerlessPatcher
Icon=PeerlessPatcher
Type=Application
Categories=Utility;
DESKTOP
cp AppDir/PeerlessPatcher.desktop AppDir/usr/share/applications/PeerlessPatcher.desktop

cp profiles/assets/icon.png AppDir/PeerlessPatcher.png
cp profiles/assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/PeerlessPatcher.png

cat > AppDir/AppRun <<'APPRUN'
#!/bin/bash
HERE="$(dirname "$(readlink -f "$0")")"
export LD_LIBRARY_PATH="$HERE/usr/bin:$LD_LIBRARY_PATH"
exec "$HERE/usr/bin/PeerlessPatcher" "$@"
APPRUN
chmod +x AppDir/AppRun

if [ ! -f appimagetool-x86_64.AppImage ]; then
  wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
  chmod +x appimagetool-x86_64.AppImage
fi

mkdir -p dist
ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir dist/PeerlessPatcher-linux-x64.AppImage
'''